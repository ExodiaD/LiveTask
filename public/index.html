<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveTask — Organize. Manage. Live.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✓</text></svg>">
</head>
<body>
  <div id="toast-container"></div>

  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-layout">
    <div class="auth-image">
      <div class="auth-quote">
        <h2>"A organização liberta tempo para o que realmente importa."</h2>
        <p>— Gerencie sua casa ou loja com facilidade.</p>
      </div>
    </div>
    <div class="auth-form-container">
      <div class="auth-box">
        <img src="logo.png" alt="LiveTask Logo" class="auth-logo">
        <h1 id="auth-title">Bem-vindo de volta</h1>
        <p id="auth-subtitle" class="text-muted">Faça login para continuar</p>

        <form id="auth-form" class="auth-form">
          <div id="register-fields" class="hidden">
            <div class="form-group">
              <label>Nome</label>
              <input type="text" id="auth-name" placeholder="Seu nome">
            </div>
            <div class="form-group">
              <label>Tipo de Conta</label>
              <div class="account-type-selector">
                <label class="type-option">
                  <input type="radio" name="account-type" value="HOME" checked>
                  <span class="type-card">🏠 Casa</span>
                </label>
                <label class="type-option">
                  <input type="radio" name="account-type" value="STORE">
                  <span class="type-card">🏪 Loja</span>
                </label>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="auth-email" required placeholder="seu@email.com">
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="auth-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg" id="auth-submit">Entrar</button>
        </form>
        <p class="auth-switch">
          <span id="auth-switch-text">Não tem uma conta?</span>
          <button id="auth-toggle-btn" class="btn-link">Criar conta</button>
        </p>
      </div>
    </div>
  </div>

  <!-- App Shell -->
  <div id="app" class="app-layout hidden">
    <!-- Top Navbar -->
    <header class="navbar">
      <div class="nav-left">
        <img src="logo.png" alt="LiveTask" class="nav-logo">
      </div>
      <nav class="nav-links">
        <a href="#" class="nav-item active" data-page="dashboard">Dashboard</a>
        <a href="#" class="nav-item" data-page="products">Produtos</a>
        <a href="#" class="nav-item store-only hidden" data-page="movements">Movimentações</a>
        <a href="#" class="nav-item" data-page="categories">Categorias</a>
      </nav>
      <div class="nav-right">
        <button class="icon-btn" id="nav-alerts">
          🔔 <span id="alert-badge" class="badge-dot hidden">0</span>
        </button>
        <div class="user-menu">
          <div class="avatar" id="user-avatar">U</div>
          <div class="user-info">
            <strong id="user-name">Usuário</strong>
            <small id="user-role">Casa</small>
          </div>
          <button class="icon-btn" id="logout-btn" title="Sair">🚪</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2 id="page-title">Dashboard</h2>
          <p id="page-subtitle" class="text-muted">Visão geral</p>
        </div>
        <div id="page-actions"></div>
      </div>
      <div class="page-content" id="page-content">
        <!-- Dynamically loaded content -->
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div class="modal-overlay hidden" id="product-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Novo Produto</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="product-form" class="modal-body">
        <input type="hidden" id="product-id">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Nome do Produto *</label>
            <input type="text" id="product-name" required>
          </div>
          <div class="form-group">
            <label>Categoria *</label>
            <select id="product-category" required></select>
          </div>
          <div class="form-group">
            <label>Quantidade</label>
            <input type="number" id="product-quantity" min="0" value="0">
          </div>
          <div class="form-group">
            <label>Data de Validade</label>
            <input type="date" id="product-expiration">
          </div>
          <div class="form-group">
            <label>Qtd. Mínima de Alerta</label>
            <input type="number" id="product-min-qty" min="0" value="1">
          </div>
          
          <!-- Store Only Fields -->
          <div class="store-fields-group hidden">
            <div class="form-group">
              <label>SKU</label>
              <input type="text" id="product-sku">
            </div>
            <div class="form-group">
              <label>Preço de Custo (R$)</label>
              <input type="number" id="product-cost" step="0.01">
            </div>
            <div class="form-group">
              <label>Preço de Venda (R$)</label>
              <input type="number" id="product-sale" step="0.01">
            </div>
            <div class="form-group">
              <label>Fornecedor</label>
              <input type="text" id="product-supplier">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="modal-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Category Modal -->
  <div class="modal-overlay hidden" id="category-modal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3 id="category-modal-title">Nova Categoria</h3>
        <button class="modal-close" id="category-modal-close">✕</button>
      </div>
      <form id="category-form" class="modal-body">
        <input type="hidden" id="category-id">
        <div class="form-group">
          <label>Nome da Categoria *</label>
          <input type="text" id="category-name" required>
        </div>
        <div class="form-group">
          <label>Ícone (Emoji)</label>
          <input type="text" id="category-icon" value="📦">
        </div>
        <div class="form-group">
          <label>Cor</label>
          <div style="display:flex;gap:10px">
            <input type="color" id="category-color" value="#0ea5e9" style="width:50px;height:40px;padding:2px">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="category-cancel">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="app.js"></script>
  <script src="app2.js"></script>
</body>
</html>
